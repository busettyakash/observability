# ══════════════════════════════════════════════════════════════════
# ADD THESE ANNOTATIONS TO EACH OF YOUR 14 EXISTING SERVICE YAMLs
# This tells Prometheus to auto-scrape them
# ══════════════════════════════════════════════════════════════════
#
# In your existing deployment YAML, under spec.template.metadata:
#
# metadata:
#   annotations:
#     prometheus.io/scrape: "true"
#     prometheus.io/path: "/actuator/prometheus"
#     prometheus.io/port: "8080"          ← change to your actual port
#
# ══════════════════════════════════════════════════════════════════

# EXAMPLE — authorization-service patch
# Run: kubectl patch deployment authorization-service -n <your-namespace> --patch-file authorization-service-patch.yaml

apiVersion: apps/v1
kind: Deployment
metadata:
  name: authorization-service
spec:
  template:
    metadata:
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8080"
