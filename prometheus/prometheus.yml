global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: "observability-stack"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - "alerts.yml"

scrape_configs:

  # ── Observability self-monitoring ────────────
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "grafana"
    static_configs:
      - targets: ["grafana:3000"]

  - job_name: "alertmanager"
    static_configs:
      - targets: ["alertmanager:9093"]

  # ── Host & Container metrics ─────────────────
  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: "cadvisor"
    scrape_interval: 10s
    static_configs:
      - targets: ["cadvisor:8080"]

  # ── PostgreSQL ───────────────────────────────
  - job_name: "postgres"
    static_configs:
      - targets: ["postgres-exporter:9187"]
    labels:
      service: "database"

  # ── Redis ────────────────────────────────────
  - job_name: "redis"
    static_configs:
      - targets: ["redis-exporter:9121"]
    labels:
      service: "cache"

  # ── Kafka ────────────────────────────────────
  - job_name: "kafka"
    static_configs:
      - targets: ["kafka-exporter:9308"]
    labels:
      service: "messaging"

  # ── Microservices ────────────────────────────
  - job_name: "user-service"
    scrape_interval: 10s
    static_configs:
      - targets: ["user-service:3001"]
    metrics_path: "/metrics"
    labels:
      service: "user-service"
      team: "backend"

  - job_name: "order-service"
    scrape_interval: 10s
    static_configs:
      - targets: ["order-service:3002"]
    metrics_path: "/metrics"
    labels:
      service: "order-service"
      team: "backend"

  - job_name: "payment-service"
    scrape_interval: 10s
    static_configs:
      - targets: ["payment-service:3003"]
    metrics_path: "/metrics"
    labels:
      service: "payment-service"
      team: "backend"
