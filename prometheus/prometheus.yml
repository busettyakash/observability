global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: "observability-stack"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - "alerts.yml"

scrape_configs:

  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Host metrics via Node Exporter
  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]

  # Container metrics via cAdvisor
  - job_name: "cadvisor"
    scrape_interval: 10s
    static_configs:
      - targets: ["cadvisor:8080"]

  # Grafana self-metrics
  - job_name: "grafana"
    static_configs:
      - targets: ["grafana:3000"]

  # Alertmanager self-metrics
  - job_name: "alertmanager"
    static_configs:
      - targets: ["alertmanager:9093"]

  # ── Add your own services below ──────────────────
  # - job_name: "my-app"
  #   static_configs:
  #     - targets: ["my-app:8000"]
